name: HACS
on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'
jobs:
  hacs:
    name: HACS Validation
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: "integration"

  hassfest:
    name: Hassfest Validation
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest
        uses: "home-assistant/actions/hassfest@master"1
